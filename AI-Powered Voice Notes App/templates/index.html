<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Notes App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🎤 Voice Notes App</h1>

    <textarea id="note" placeholder="Transcribed text will appear here..."></textarea>
    
    <div>
      <button onclick="startListening()">Start Recording</button>
      <button onclick="stopListening()">Stop</button>
      <button onclick="summarizeNote()">Summarize</button>
      <button onclick="saveNote()">Save Note</button>
    </div>

    <p id="status">Status: Idle</p>
    <h3>📝 Summary</h3>
    <p id="summary" style="background: #eef; padding: 10px; border-radius: 8px;"></p>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

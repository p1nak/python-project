<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis Web Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0d0d;
      --text-color: #00ffe1;
      --btn-bg: linear-gradient(45deg, #00ffe1, #006dff);
      --btn-text: #000;
      --log-bg: rgba(0, 255, 225, 0.05);
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      padding: 40px 20px;
      transition: all 0.3s ease;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: var(--text-color);
      text-shadow: 0 0 8px var(--text-color);
    }

    select, button {
      font-family: 'Orbitron', sans-serif;
      transition: 0.3s ease;
    }

    #listenBtn {
      padding: 14px 30px;
      font-size: 20px;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-text);
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 10px var(--text-color);
    }

    #listenBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--text-color), 0 0 40px var(--text-color);
    }

    #waveform {
      display: flex;
      justify-content: center;
      align-items: end;
      height: 60px;
      margin: 20px auto;
      gap: 8px;
      visibility: hidden;
    }

    .bar {
      width: 6px;
      height: 10px;
      background: var(--text-color);
      border-radius: 3px;
      animation: pulse 1s infinite ease-in-out;
    }

    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { height: 10px; }
      50% { height: 45px; }
    }

    #listeningIndicator {
      margin-top: 12px;
      font-size: 18px;
      color: var(--text-color);
      visibility: hidden;
      animation: glow 1.4s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px var(--text-color); }
      to { text-shadow: 0 0 20px var(--text-color); }
    }

    #historyLog {
      margin-top: 30px;
      max-height: 250px;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid var(--text-color);
      border-radius: 12px;
      background-color: var(--log-bg);
      text-align: left;
    }

    .log-entry {
      margin: 10px 0;
      color: #bff;
    }

    .log-entry time {
      font-size: 0.8rem;
      color: #888;
    }

    #controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    select, #toggleTheme {
      padding: 10px 16px;
      font-size: 16px;
      border-radius: 20px;
      border: none;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }

    select:hover, #toggleTheme:hover {
      background-color: #555;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      #listenBtn {
        font-size: 18px;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>

  <h1>🤖 Jarvis Web Assistant</h1>
  <button id="listenBtn" onclick="startContinuousListening()">🎤 Start Listening</button>
  <div id="listeningIndicator">🔵 Jarvis is Listening...</div>

  <div id="waveform">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div id="historyLog"></div>

  <div id="controls">
    <button id="toggleTheme" onclick="toggleTheme()">Toggle Dark/Light</button>
    <select id="themeSelector" onchange="setTheme(this.value)">
      <option value="default">🌑 Default</option>
      <option value="neon">🌈 Neon</option>
      <option value="retro">🟡 Retro</option>
    </select>
  </div>

  <script>
    let listening = false;
    let recognition;
    const historyLog = document.getElementById("historyLog");

    const themes = {
      default: {
        '--bg-color': '#0d0d0d',
        '--text-color': '#00ffe1',
        '--btn-bg': 'linear-gradient(45deg, #00ffe1, #006dff)',
        '--btn-text': '#000',
        '--log-bg': 'rgba(0, 255, 225, 0.05)'
      },
      neon: {
        '--bg-color': '#010a13',
        '--text-color': '#39ff14',
        '--btn-bg': 'linear-gradient(45deg, #39ff14, #00f7ff)',
        '--btn-text': '#000',
        '--log-bg': 'rgba(57, 255, 20, 0.08)'
      },
      retro: {
        '--bg-color': '#fef6e4',
        '--text-color': '#001858',
        '--btn-bg': 'linear-gradient(45deg, #f582ae, #f3d2c1)',
        '--btn-text': '#fff',
        '--log-bg': 'rgba(0, 24, 88, 0.05)'
      }
    };

    function setTheme(theme) {
      const selected = themes[theme];
      Object.entries(selected).forEach(([key, val]) => {
        document.documentElement.style.setProperty(key, val);
      });
      localStorage.setItem("theme", theme);
      document.getElementById("themeSelector").value = theme;
    }

    function loadTheme() {
      const saved = localStorage.getItem("theme") || "default";
      setTheme(saved);
    }

    function toggleTheme() {
      const curr = document.body.classList.contains("light-mode");
      document.body.classList.toggle("light-mode", !curr);
      document.body.classList.toggle("dark-mode", curr);
    }

    function logToHistory(user, response) {
      const entry = document.createElement("div");
      entry.className = "log-entry";
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<time>[${time}]</time><br><strong>You:</strong> ${user}<br><strong>Jarvis:</strong> ${response}`;
      historyLog.prepend(entry);
    }

    function startContinuousListening() {
      if (listening) return;
      listening = true;

      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onstart = () => {
        document.getElementById("waveform").style.visibility = "visible";
        document.getElementById("listeningIndicator").style.visibility = "visible";
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript.toLowerCase().trim();

        if (transcript === "exit" || transcript === "jarvis exit") {
          stopListening("🔴 Jarvis stopped listening.");
          return;
        }

        if (transcript.startsWith("jarvis")) {
          const command = transcript.replace("jarvis", "").trim();

          fetch("/process", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ command: command })
          })
          .then(response => response.json())
          .then(data => {
            const reply = data.response;
            logToHistory(transcript, reply);
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(reply);
            synth.speak(utter);
          })
          .catch(error => {
            console.error("❌ Error:", error);
            logToHistory(transcript, "Something went wrong.");
          });
        }

        if (listening) recognition.start();
      };

      recognition.onerror = function(event) {
        console.error("Recognition error:", event.error);
        if (listening) recognition.start();
      };

      recognition.onend = function() {
        if (listening) recognition.start();
      };

      recognition.start();
    }

    function stopListening(message) {
      listening = false;
      recognition.stop();
      document.getElementById("waveform").style.visibility = "hidden";
      document.getElementById("listeningIndicator").style.visibility = "hidden";
      logToHistory("System", message);
    }

    loadTheme(); // Load saved theme on page load
  </script>
</body>
</html>
